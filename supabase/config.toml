
[functions.slack-outbound]
enabled = true
verify_jwt = true
import_map = "./functions/slack-outbound/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/slack-outbound/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/slack-outbound/*.html" ]

[functions.slack-inbound]
enabled = true
verify_jwt = true
import_map = "./functions/slack-inbound/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/slack-inbound/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/slack-inbound/*.html" ]
